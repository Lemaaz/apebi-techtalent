name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Variables minimales pour le build Next.js (valeurs fictives pour CI)
      NEXT_PUBLIC_SUPABASE_URL:         ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY:    ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL:              ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_APP_NAME:             'APEBI TechTalent'
      SUPABASE_SERVICE_ROLE_KEY:        ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY:                   ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY:                ${{ secrets.ANTHROPIC_API_KEY }}
      CRON_SECRET:                      ${{ secrets.CRON_SECRET || 'ci-secret' }}
      PLAYWRIGHT_TEST_TALENT_EMAIL:     ${{ secrets.PLAYWRIGHT_TEST_TALENT_EMAIL }}
      PLAYWRIGHT_TEST_TALENT_PASSWORD:  ${{ secrets.PLAYWRIGHT_TEST_TALENT_PASSWORD }}
      PLAYWRIGHT_TEST_RECRUITER_EMAIL:  ${{ secrets.PLAYWRIGHT_TEST_RECRUITER_EMAIL }}
      PLAYWRIGHT_TEST_RECRUITER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_RECRUITER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Build Next.js
        run: pnpm build
      - name: Run Playwright (smoke — public pages only)
        run: pnpm exec playwright test --project=chromium --grep "@smoke" || pnpm exec playwright test --project=chromium e2e/auth.spec.ts e2e/unsubscribe.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
